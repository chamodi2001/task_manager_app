version: "3.9"

# In production (EC2), images are pulled from GHCR.
# Locally, they are built from source.
# The BACKEND_IMAGE / FRONTEND_IMAGE / NGINX_IMAGE env vars let
# the CI/CD pipeline pin to an exact SHA-tagged image.

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Django Backend ───────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-task-manager-app-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
      USE_S3: ${USE_S3:-False}
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    networks:
      - internal

  # ─── React Frontend ───────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-task-manager-app-frontend:local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    restart: unless-stopped
    networks:
      - internal

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: ${NGINX_IMAGE:-task-manager-app-nginx:local}
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    networks:
      - internal
      - external

  # ─── Certbot (SSL Auto-Renewal) ───────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renews every 12 h; first-time issuance done via init-ssl.sh
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres_data:
  media_files:
  static_files:
  certbot_conf:
  certbot_www:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
