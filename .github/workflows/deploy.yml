name: Build and Deploy Task Manager App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v3

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@master
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
          AWS_S3_REGION_NAME: ${{ secrets.AWS_S3_REGION_NAME }}
          USE_S3: ${{ secrets.USE_S3 }}
          DOMAIN: ${{ secrets.DOMAIN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DJANGO_SECRET_KEY,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,AWS_STORAGE_BUCKET_NAME,AWS_S3_REGION_NAME,USE_S3,DOMAIN,CERTBOT_EMAIL,HUB_TOKEN
          command_timeout: 30m
          script: |

            echo "===== Checking Docker ====="
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing..."
              sudo yum update -y
              sudo yum install -y docker
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ec2-user
            fi

            echo "===== Installing Docker Compose v2 + Buildx ====="
            # Always reinstall to guarantee we have a recent enough version
            # (buildx 0.17+ is required by newer compose builds)
            COMPOSE_VERSION="v2.27.0"
            BUILDX_VERSION="v0.17.0"

            sudo mkdir -p /usr/local/lib/docker/cli-plugins

            # Docker Compose v2
            sudo curl -SL \
              "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
              -o /usr/local/lib/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

            # Docker Buildx
            sudo curl -SL \
              "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64" \
              -o /usr/local/lib/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx

            # Also expose as standalone docker-compose command
            sudo ln -sf /usr/local/lib/docker/cli-plugins/docker-compose /usr/local/bin/docker-compose

            echo "Docker Compose version: $(docker compose version)"
            echo "Docker Buildx version:  $(docker buildx version)"

            echo "===== Syncing code from GitHub ====="
            cd /home/ec2-user
            if [ -d "task_manager_app" ]; then
              cd task_manager_app
              git fetch origin main
              git reset --hard origin/main
            else
              git clone --branch main https://$HUB_TOKEN@github.com/chamodi2001/task_manager_app.git
              cd task_manager_app
            fi

            echo "===== Writing .env file ====="
            cat > .env << ENVFILE
            DOMAIN=$DOMAIN
            CERTBOT_EMAIL=$CERTBOT_EMAIL
            DJANGO_SECRET_KEY=$DJANGO_SECRET_KEY
            DEBUG=False
            ALLOWED_HOSTS=$DOMAIN,www.$DOMAIN
            CORS_ALLOWED_ORIGINS=https://$DOMAIN,https://www.$DOMAIN
            POSTGRES_DB=$POSTGRES_DB
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            AWS_STORAGE_BUCKET_NAME=$AWS_STORAGE_BUCKET_NAME
            AWS_S3_REGION_NAME=$AWS_S3_REGION_NAME
            USE_S3=$USE_S3
            ENVFILE

            echo "===== Deploying containers ====="
            docker compose down
            docker image prune -af
            docker compose up -d --build
            docker compose ps

            echo "===== Running Django migrations ====="
            docker compose exec -T backend python manage.py migrate --noinput
            docker compose exec -T backend python manage.py collectstatic --noinput

            echo "===== Deploy complete! ====="
