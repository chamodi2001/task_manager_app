name: Build and Deploy Task Manager App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v3

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@master
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
          AWS_S3_REGION_NAME: ${{ secrets.AWS_S3_REGION_NAME }}
          USE_S3: ${{ secrets.USE_S3 }}
          DOMAIN: ${{ secrets.DOMAIN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
          # ── No AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY ──
          # Credentials come from the IAM Role attached to the EC2 instance.
          # boto3 fetches them automatically — nothing to pass here.
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DJANGO_SECRET_KEY,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,AWS_STORAGE_BUCKET_NAME,AWS_S3_REGION_NAME,USE_S3,DOMAIN,CERTBOT_EMAIL,HUB_TOKEN
          command_timeout: 30m
          script: |

            echo "===== Checking Docker & Docker Compose ====="
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing..."
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker $USER
            fi

            if ! command -v docker-compose >/dev/null 2>&1; then
              echo "Docker Compose not found. Installing..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" \
                -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            echo "===== Syncing code from GitHub ====="
            cd /home/ubuntu
            if [ -d "task_manager_app" ]; then
              cd task_manager_app
              git fetch origin main
              git reset --hard origin/main
            else
              git clone --branch main https://$HUB_TOKEN@github.com/YOUR_USERNAME/task_manager_app.git
              cd task_manager_app
            fi

            echo "===== Writing .env file ====="
            cat > .env << ENVFILE
            DOMAIN=$DOMAIN
            CERTBOT_EMAIL=$CERTBOT_EMAIL
            DJANGO_SECRET_KEY=$DJANGO_SECRET_KEY
            DEBUG=False
            ALLOWED_HOSTS=$DOMAIN,www.$DOMAIN
            CORS_ALLOWED_ORIGINS=https://$DOMAIN,https://www.$DOMAIN
            POSTGRES_DB=$POSTGRES_DB
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            AWS_STORAGE_BUCKET_NAME=$AWS_STORAGE_BUCKET_NAME
            AWS_S3_REGION_NAME=$AWS_S3_REGION_NAME
            USE_S3=$USE_S3
            ENVFILE

            echo "===== Building images ====="
            docker-compose build

            # ── SSL Bootstrap (first deploy only) ───────────────────────
            if [ ! -f "/var/lib/docker/volumes/task_manager_app_certbot_conf/_data/live/$DOMAIN/fullchain.pem" ]; then
              echo "===== First deploy — bootstrapping SSL certificate ====="
              docker-compose up -d db backend frontend certbot
              sleep 5
              docker-compose run --rm certbot certonly \
                --standalone \
                --non-interactive \
                --agree-tos \
                --email $CERTBOT_EMAIL \
                -d $DOMAIN \
                -d www.$DOMAIN
              echo "===== Certificate issued — starting nginx ====="
              docker-compose up -d nginx
            fi
            # ── End SSL Bootstrap ────────────────────────────────────────

            echo "===== Deploying all containers ====="
            docker-compose down
            docker image prune -af
            docker-compose up -d --build
            docker-compose ps

            echo "===== Running Django migrations ====="
            docker-compose exec -T backend python manage.py migrate --noinput
            docker-compose exec -T backend python manage.py collectstatic --noinput

            echo "===== Deploy complete! ====="