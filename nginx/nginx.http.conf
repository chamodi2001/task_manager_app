# HTTP-only config — used on first boot before SSL cert exists.
# Serves the ACME challenge so certbot can issue the certificate.
server {
    listen 80;
    server_name ${DOMAIN} www.${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
